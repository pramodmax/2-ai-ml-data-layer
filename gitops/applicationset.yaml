apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-ml-data-layer
  namespace: openshift-gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/pramodmax/2-ai-ml-data-layer.git
      revision: main
      directories:
      - path: gitops/core/*
      - path: gitops/opt/nfd
      - path: gitops/opt/gpu
  template:
    metadata:
      name: "{{path.basename}}"
      namespace: openshift-gitops
      annotations:
        argocd.argoproj.io/managed-by: openshift-gitops
    spec:
      project: default
      source:
        repoURL: https://github.com/pramodmax/2-ai-ml-data-layer.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
        - CreateNamespace=false
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
