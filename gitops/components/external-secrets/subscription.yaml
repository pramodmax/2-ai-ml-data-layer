# Red Hat certified External Secrets Operator from certified-operators catalog.
# Allows workloads to pull secrets from AWS Secrets Manager, HashiCorp Vault,
# Azure Key Vault, GCP Secret Manager, and others into Kubernetes Secrets.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: external-secrets-operator
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: external-secrets-operator
  source: certified-operators
  sourceNamespace: openshift-marketplace
