# All operator and tenant namespaces created first (sync wave -5) so that
# subsequent components can reference them without race conditions.

apiVersion: v1
kind: Namespace
metadata:
  name: redhat-ods-operator
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: rhsso
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: Namespace
metadata:
  name: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  labels:
    openshift.io/cluster-monitoring: "true"
---
# Data Science Project namespace — labels register it in the RHOAI dashboard
apiVersion: v1
kind: Namespace
metadata:
  name: data-science-project
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    openshift.io/display-name: "AI/ML Data Science Project"
    openshift.io/description: "Primary data science workspace for AI/ML workloads"
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
