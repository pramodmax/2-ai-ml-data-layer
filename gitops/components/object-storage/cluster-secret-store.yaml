apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    aws:
      service: SecretsManager
      # Update region to match your AWS deployment region.
      region: us-east-1
      auth:
        # Uses the EC2 instance role on worker nodes — no static credentials
        # required when running on AWS IPI. The instance role must have:
        #   secretsmanager:GetSecretValue on the S3 credentials secret below.
        #
        # To use a static IAM key instead, replace jwt with:
        #   secretRef:
        #     accessKeyIDSecretRef:
        #       name: aws-creds
        #       namespace: external-secrets
        #       key: access-key-id
        #     secretAccessKeySecretRef:
        #       name: aws-creds
        #       namespace: external-secrets
        #       key: secret-access-key
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
