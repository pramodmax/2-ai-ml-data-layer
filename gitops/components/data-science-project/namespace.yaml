# RoleBinding grants data scientists admin access to the project namespace.
# Adjust subjects to match your SSO groups or individual users.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-science-project-admin
  namespace: data-science-project
  annotations:
    argocd.argoproj.io/sync-wave: "20"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: data-scientists
