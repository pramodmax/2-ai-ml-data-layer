# Grafana Operator v5 from community-operators.
# Provides custom dashboards for RHOAI model metrics, pipeline runs,
# GPU utilisation, and cluster resource consumption.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: grafana-operator
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  channel: v5
  installPlanApproval: Automatic
  name: grafana-operator
  source: community-operators
  sourceNamespace: openshift-marketplace
