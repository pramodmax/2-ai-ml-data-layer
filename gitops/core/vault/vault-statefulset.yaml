apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: vault
        image: docker.io/hashicorp/vault:1.15
        command: ["vault", "server", "-config=/vault/config/vault.hcl"]
        ports:
        - containerPort: 8200
          name: api
        env:
        - name: HOME
          value: /tmp
        volumeMounts:
        - name: data
          mountPath: /vault/data
        - name: config
          mountPath: /vault/config
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        livenessProbe:
          tcpSocket:
            port: 8200
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            # uninitcode=200 and sealedcode=200 make vault report ready in all
            # states so ArgoCD marks the StatefulSet healthy and the PostSync
            # init Job can fire. VSO retries internally if vault is still sealed.
            path: /v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200
            port: 8200
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: vault-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 10Gi
