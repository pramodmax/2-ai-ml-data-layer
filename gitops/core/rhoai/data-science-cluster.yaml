apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    dashboard:
      managementState: Managed

    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks

    # Kubeflow Pipelines v2 / Argo Workflows (replaces datasciencepipelines in 3.x)
    aipipelines:
      managementState: Managed
      argoWorkflowsControllers:
        managementState: Managed

    # Single-model serving via KServe (cert-manager required)
    kserve:
      managementState: Managed
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headless

    # Distributed training queue management — set Unmanaged because we install
    # the kueue operator separately via its own GitOps component
    kueue:
      managementState: Unmanaged
      defaultClusterQueueName: default
      defaultLocalQueueName: default

    # Model Registry — central store for versioned model metadata
    # Requires rhoai-model-registries namespace (created in namespaces component)
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries

    # MLflow experiment tracking and model registry (Technology Preview in 3.4)
    mlflowoperator:
      managementState: Managed

    # Distributed training via Ray clusters
    ray:
      managementState: Managed

    # Kubeflow Training Operator for PyTorchJob / TFJob / etc.
    trainingoperator:
      managementState: Managed

    # Model bias detection and explainability
    trustyai:
      managementState: Managed

    # Feature Store based on Feast (optional — enable when feature pipelines are needed)
    feastoperator:
      managementState: Removed

    # Llama Stack for RAG workloads (requires Service Mesh 3.x — enable separately)
    llamastackoperator:
      managementState: Removed
