apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: s3-credentials
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: s3-credentials
    creationPolicy: Owner
  data:
  - secretKey: AWS_ACCESS_KEY_ID
    remoteRef:
      # Pre-create this secret in AWS Secrets Manager before applying.
      # Name must match the path you create:
      #   aws secretsmanager create-secret \
      #     --name "ocp-ai/s3-credentials" \
      #     --secret-string '{"accessKeyId":"...","secretAccessKey":"...","bucketName":"...","region":"us-east-1"}'
      key: ocp-ai/s3-credentials
      property: accessKeyId
  - secretKey: AWS_SECRET_ACCESS_KEY
    remoteRef:
      key: ocp-ai/s3-credentials
      property: secretAccessKey
  - secretKey: AWS_S3_BUCKET
    remoteRef:
      key: ocp-ai/s3-credentials
      property: bucketName
  - secretKey: AWS_DEFAULT_REGION
    remoteRef:
      key: ocp-ai/s3-credentials
      property: region
