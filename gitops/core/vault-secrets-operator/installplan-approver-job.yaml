apiVersion: batch/v1
kind: CronJob
metadata:
  name: approve-install-plan
  namespace: openshift-operators
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: install-plan-approver
          restartPolicy: OnFailure
          containers:
          - name: approve
            image: quay.io/openshift/origin-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              IP=$(oc get subscription vault-secrets-operator -n openshift-operators \
                -o jsonpath='{.status.installPlanRef.name}' 2>/dev/null)
              if [ -z "$IP" ]; then
                echo "No InstallPlan reference found, nothing to do."
                exit 0
              fi
              APPROVED=$(oc get installplan "$IP" -n openshift-operators \
                -o jsonpath='{.spec.approved}' 2>/dev/null)
              if [ "$APPROVED" = "true" ]; then
                echo "InstallPlan $IP already approved."
              else
                oc patch installplan "$IP" -n openshift-operators \
                  --type=merge -p '{"spec":{"approved":true}}'
                echo "Approved InstallPlan $IP"
              fi
