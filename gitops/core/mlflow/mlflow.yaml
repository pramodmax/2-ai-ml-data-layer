apiVersion: mlflow.opendatahub.io/v1
kind: MLflow
metadata:
  name: mlflow
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # SQLite backend for run metadata. For production replace with PostgreSQL:
  #   backendStoreUri: "postgresql://user:pass@host:5432/mlflow"
  storage:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
  backendStoreUri: "sqlite:////mlflow/mlflow.db"
  # Artifacts stored in RustFS (S3-compatible). The s3-credentials Secret in
  # redhat-ods-applications supplies AWS_S3_ENDPOINT_URL, access key, and bucket.
  artifactsDestination: "s3://rhoai-models/mlflow"
  serveArtifacts: true
  image:
    imagePullPolicy: Always
